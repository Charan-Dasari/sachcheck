name: sachcheck
description: SachDrishti - News Screenshot Verification System
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # OCR
  google_mlkit_text_recognition: ^0.13.0

  # Image picking
  image_picker: ^1.1.2

  # Networking
  http: ^1.2.1

  # State management
  flutter_riverpod: ^2.5.1

  # Navigation
  go_router: ^14.2.7

  # Local storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Firebase
  firebase_core: ^3.8.1
  firebase_auth: ^5.4.1
  cloud_firestore: ^5.6.1
  google_sign_in: ^6.2.2

  # Animations
  lottie: ^3.1.2

  # Images
  cached_network_image: ^3.3.1

  # Sharing
  share_plus: ^10.1.4

  # Fonts
  google_fonts: ^6.2.1

  # UUID generation
  uuid: ^4.4.0

  # Shared preferences
  shared_preferences: ^2.3.2

  # Date formatting
  intl: ^0.19.0

  # Relative time formatting
  timeago: ^3.7.0

  # Icons
  cupertino_icons: ^1.0.8

  # URL launcher
  url_launcher: ^6.2.5

  # Path utilities
  path: ^1.9.0
  path_provider: ^2.1.3

  # Shimmer loading effect
  shimmer: ^3.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.9
  flutter_launcher_icons: ^0.14.1

# ─── Launcher Icon Config ─────────────────────────────────────────────────────
flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/SachDristhi_1.png"
  min_sdk_android: 21
  adaptive_icon_background: "#1B3BA6"
  adaptive_icon_foreground: "assets/images/SachDristhi_1.png"
  remove_alpha_ios: true

# ─────────────────────────────────────────────────────────────────────────────

flutter:
  uses-material-design: true
  assets:
    - assets/animations/
    - assets/images/